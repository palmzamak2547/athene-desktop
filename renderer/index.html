<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Athene Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- left: brand + threads -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <span class="wordmark">Athene</span>
      </div>
      <button id="new" class="new-chat">
        <span class="plus" aria-hidden="true">+</span> New chat
      </button>
      <div class="threads-label">Recent</div>
      <ul id="threads" class="threads"></ul>
      <div class="sidebar-foot">
        <div class="engine-pill">
          <span class="engine-dot" aria-hidden="true"></span>
          <span id="engine" class="engine">checking engines…</span>
        </div>
      </div>
    </aside>

    <!-- right: chat -->
    <main class="chat">
      <header class="topbar">
        <span class="topbar-tag">Local-first agent</span>
        <div class="spacer"></div>
        <div class="mode-field">
          <label for="mode" class="mode-label">Engine</label>
          <div class="select-wrap">
            <select id="mode" title="Which engine to use">
              <option value="athene">Athene agent (balanced)</option>
              <option value="athene-fast">Athene agent (fast)</option>
              <option value="athene-deep">Athene agent (deep)</option>
              <option value="local">Local only (Ollama, no tools)</option>
              <option value="cloud">Cloud only (free, no tools)</option>
            </select>
            <span class="select-caret" aria-hidden="true"></span>
          </div>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="empty" id="empty">
          <div class="empty-logo" aria-hidden="true"></div>
          <h1>Ask Athene</h1>
          <p>
            Athene drives its real agent: free frontier models with tools,
            read-only by default. Pick Local or Cloud in the engine selector.
          </p>
          <div class="prompt-chips">
            <button
              class="prompt-chip"
              type="button"
              data-prompt="What does this project do? Give me a quick tour."
            >
              What does this project do?
            </button>
            <button
              class="prompt-chip"
              type="button"
              data-prompt="Explain how the main entry point works, step by step."
            >
              Explain the main entry point
            </button>
            <button
              class="prompt-chip"
              type="button"
              data-prompt="Find the most complex file in this codebase and summarize what it does."
            >
              Find the most complex file
            </button>
          </div>
        </div>
      </div>

      <footer class="composer">
        <div class="composer-inner">
          <textarea
            id="input"
            rows="1"
            placeholder="Message Athene…"
          ></textarea>
          <button id="send" class="send" aria-label="Send message" title="Send">
            <svg
              class="send-icon"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              aria-hidden="true"
            >
              <path
                d="M12 19V5M12 5l-6 6M12 5l6 6"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div class="composer-hint">
          <span>Enter to send</span>
          <span class="hint-sep" aria-hidden="true"></span>
          <span>Shift + Enter for a new line</span>
        </div>
      </footer>
    </main>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
